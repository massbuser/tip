name: production

on:
  push:

jobs:
  not:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        phase: ["emperor", "immeasurable", "muddy", "pack", "skillful"]
        echo: ["limitation", "clinic", "impress", "judge"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar EH.jar
